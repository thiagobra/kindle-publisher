[tool.ruff]
target-version = "py310"
line-length = 100
# Vendored from the pdf-doc skill; do not lint or format locally.
extend-exclude = ["engines/pdf_engine.py"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
